    // Partículas
    function createParticles() {
      const container = document.getElementById('particles');
      const count = window.innerWidth < 768 ? 15 : 30;
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.classList.add('particle');
        const size = Math.random() * 4 + 1;
        const posX = Math.random() * 100;
        const posY = Math.random() * 100;
        const delay = Math.random() * 20;
        const duration = Math.random() * 10 + 10;
        p.style.width = p.style.height = `${size}px`;
        p.style.left = `${posX}%`;
        p.style.top = `${posY}%`;
        p.style.animation = `float ${duration}s ease-in-out ${delay}s infinite`;
        container.appendChild(p);
      }
      const style = document.createElement('style');
      style.textContent = `
        @keyframes float {
          0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
          50% { transform: translateY(-20px) translateX(10px); opacity: 0.7; }
          80% { opacity: 0; }
        }
      `;
      document.head.appendChild(style);
    }

    const elements = {
      subtitle: document.querySelector('.subtitle'),
      mainTitle: document.getElementById('main-title'),
      mainPara: document.getElementById('main-para'),
      visionTitle: document.getElementById('vision-title'),
      visionPara: document.getElementById('vision-para'),
      callTitle: document.getElementById('call-title'),
      callPara: document.getElementById('call-para'),
      quotePara: document.getElementById('quote-para'),
      contactBtn: document.getElementById('contact-btn'),
      donateText: document.querySelector('.donation-title'),
      copyBtn: document.getElementById('copy-btn')
    };

    function updateLanguage(lang) {
      const t = translations[lang] || translations['es'];
      document.documentElement.lang = lang;
      document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';

      if (elements.subtitle) elements.subtitle.innerText = t.subtitle;
      if (elements.mainTitle) elements.mainTitle.innerText = t.mainTitle;
      if (elements.mainPara) elements.mainPara.innerHTML = t.main;
      if (elements.visionTitle) elements.visionTitle.innerText = t.visionTitle;
      if (elements.visionPara) elements.visionPara.innerHTML = t.vision;
      if (elements.callTitle) elements.callTitle.innerText = t.callTitle;
      if (elements.callPara) elements.callPara.innerHTML = t.call;
      if (elements.quotePara) elements.quotePara.innerText = t.quote;
      if (elements.contactBtn) elements.contactBtn.innerText = t.button;
      if (elements.donateText) elements.donateText.innerText = t.donate;
      if (elements.copyBtn) elements.copyBtn.textContent = t.copyBtn;
    }

    document.getElementById('lang-select').addEventListener('change', (e) => {
      updateLanguage(e.target.value);
    });

    // Inicializar
    createParticles();
    updateLanguage('es');
  </script>
</body>
